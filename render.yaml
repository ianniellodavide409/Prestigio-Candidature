services:
  - type: web
    name: prestigio-candidature
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: prestigio2025
      - key: NOTIFY_EMAIL
        value: info@prestigioargentieori.it
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
